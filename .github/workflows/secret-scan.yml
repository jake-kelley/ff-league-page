name: Secret scan (Kingfisher)

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 14 * * 1'   # Monday 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  kingfisher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Kingfisher
        id: scan
        continue-on-error: true
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}":/src \
            ghcr.io/mongodb/kingfisher:latest \
            scan /src \
              --format sarif \
              --output /src/kingfisher.sarif \
              --no-validate

      - name: Upload SARIF to Code Scanning
        if: hashFiles('kingfisher.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kingfisher.sarif
          category: kingfisher

      - name: Upload SARIF artifact
        if: hashFiles('kingfisher.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: kingfisher-sarif
          path: kingfisher.sarif
          retention-days: 30

      - name: Fail on validated findings
        if: steps.scan.outcome == 'failure'
        run: |
          echo "Kingfisher exited non-zero — see SARIF upload above for findings."
          exit 1
